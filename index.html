<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020611;
  overflow:hidden;
  font-family:Arial;
  color:#00e5ff;
}

/* BACKGROUND GRID */

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
  linear-gradient(#00e5ff10 1px, transparent 1px),
  linear-gradient(90deg,#00e5ff10 1px, transparent 1px);

  background-size:40px 40px;
}

/* MAIN */

.main{
  position:relative;
  z-index:2;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TITLE */

.title{
  margin-top:20px;
  font-size:48px;
  letter-spacing:10px;

  text-shadow:
  0 0 10px #00e5ff,
  0 0 30px #00e5ff;
}

/* TOP STATUS */

.topbar{
  width:95%;
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.panel{
  border:1px solid #00e5ff55;
  background:#06131faa;
  backdrop-filter:blur(10px);
  border-radius:15px;
  padding:15px;
  box-shadow:0 0 20px #00e5ff22;
}

.small{
  width:220px;
  min-height:100px;
}

/* CENTER AREA */

.center{
  display:flex;
  width:100%;
  justify-content:space-between;
  align-items:center;
  margin-top:20px;
}

/* SIDE PANELS */

.side{
  width:22%;
  padding:10px;
}

/* CORE */

.core-area{
  width:56%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.core{

  width:320px;
  height:320px;
  border-radius:50%;
  position:relative;

  border:4px solid #00e5ff;

  box-shadow:
  0 0 30px #00e5ff,
  0 0 80px #00e5ff;

  animation:rotate 12s linear infinite;
}

.core::before{
  content:"";
  position:absolute;
  inset:30px;
  border-radius:50%;
  border:3px solid #00e5ff;
}

.core::after{
  content:"";
  position:absolute;
  inset:90px;
  border-radius:50%;

  background:#00e5ff;

  box-shadow:
  0 0 30px #00e5ff,
  0 0 80px #00e5ff,
  0 0 120px #00e5ff;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* STATUS */

#status{
  margin-top:20px;
  font-size:24px;
}

/* MEMORY */

.memory-item{
  margin-top:10px;
  padding:8px;
  border-left:2px solid #00e5ff;
  background:#00e5ff11;
}

/* LOGS */

.logs{
  margin-top:15px;
  height:180px;
  overflow:auto;
  font-size:14px;
}

/* WAVE */

.wave{
  width:100%;
  height:60px;
  margin-top:10px;

  background:
  repeating-linear-gradient(
    90deg,
    #00e5ff,
    #00e5ff 2px,
    transparent 2px,
    transparent 6px
  );

  animation:wave 1s linear infinite;
}

@keyframes wave{
  from{background-position:0 0;}
  to{background-position:40px 0;}
}

/* BUTTONS */

.controls{
  margin-top:25px;
}

button{
  padding:15px 30px;
  margin:10px;

  border:none;
  border-radius:12px;

  background:#00e5ff22;
  color:#00e5ff;

  font-size:18px;

  border:1px solid #00e5ff88;

  box-shadow:0 0 15px #00e5ff55;
}

button:active{
  transform:scale(0.95);
}

</style>

</head>

<body>

<div class="main">

<div class="title">JARVIS</div>

<div class="topbar">

<div class="panel small">
<h3>SYSTEM STATUS</h3>
<p>ONLINE</p>
<p id="status">Idle</p>
</div>

<div class="panel small">
<h3>TIME</h3>
<p id="clock"></p>
</div>

</div>

<div class="center">

<div class="side">

<div class="panel">

<h3>MEMORY CORE</h3>

<div id="memoryList"></div>

</div>

</div>

<div class="core-area">

<div class="core"></div>

</div>

<div class="side">

<div class="panel">

<h3>VOICE INPUT</h3>

<div class="wave"></div>

<div class="logs" id="logs"></div>

</div>

</div>

</div>

<div class="controls">

<button onclick="startJarvis()">START</button>

<button onclick="stopJarvis()">STOP</button>

</div>

</div>

<script>

let recognition;
let isListening = false;

// CLOCK

setInterval(()=>{

  document.getElementById("clock").innerText =
  new Date().toLocaleTimeString();

},1000);

// STATUS

function setStatus(text){

  document.getElementById("status").innerText = text;
}

// LOGS

function addLog(text){

  let logs = document.getElementById("logs");

  logs.innerHTML += "<div>" + text + "</div>";

  logs.scrollTop = logs.scrollHeight;
}

// SPEAK

function speak(text){

  addLog("Jarvis: " + text);

  let speech =
  new SpeechSynthesisUtterance(text);

  speech.rate = 0.95;

  speech.onstart = ()=>{

    setStatus("Responding...");
  };

  speech.onend = ()=>{

    if(isListening){

      setTimeout(startListening,500);
    }
  };

  speechSynthesis.cancel();

  speechSynthesis.speak(speech);
}

// MEMORY SAVE

function rememberFact(fact){

  let memory = JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );

  memory.push(fact);

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify(memory)
  );

  updateMemoryUI();
}

// MEMORY LOAD

function getMemory(){

  return JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );
}

// MEMORY UI

function updateMemoryUI(){

  let memory = getMemory();

  let box =
  document.getElementById("memoryList");

  box.innerHTML = "";

  memory.forEach(item=>{

    box.innerHTML +=
    '<div class="memory-item">' +
    item +
    '</div>';
  });
}

// MATCH

function match(text,arr){

  return arr.some(k=>text.includes(k));
}

// COMMAND ENGINE

function processCommand(raw){

  let text = raw.toLowerCase();

  addLog("User: " + text);

  // MEMORY SAVE

  if(
    text.startsWith("remember")
  ){

    let fact = text
    .replace("remember that","")
    .replace("remember","")
    .trim();

    if(fact){

      rememberFact(fact);

      speak("Memory saved.");

      return;
    }
  }

  // MEMORY RECALL

  if(
    match(text,[
      "what do you remember",
      "show memory",
      "memory"
    ])
  ){

    let memory = getMemory();

    if(memory.length === 0){

      speak("Memory empty.");

      return;
    }

    speak(
      "I remember " +
      memory.join(". ")
    );

    return;
  }

  // TIME

  if(text.includes("time")){

    let time =
    new Date().toLocaleTimeString();

    speak("The time is " + time);

    return;
  }

  // YOUTUBE

  if(text.includes("youtube")){

    speak("Opening YouTube");

    window.open(
      "https://youtube.com"
    );

    return;
  }

  // IDENTITY

  if(
    match(text,[
      "who are you",
      "your name"
    ])
  ){

    speak(
      "I am Jarvis, your AI assistant."
    );

    return;
  }

  // STOP

  if(
    match(text,[
      "stop",
      "shutdown",
      "exit"
    ])
  ){

    speak("Shutting down.");

    stopJarvis();

    return;
  }

  // DEFAULT

  speak(
    "Command not recognized."
  );
}

// START

function startJarvis(){

  let SR =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

  if(!SR){

    alert("Use Chrome browser");

    return;
  }

  recognition = new SR();

  recognition.lang = "en-US";

  recognition.continuous = false;

  recognition.interimResults = false;

  isListening = true;

  speak("Jarvis activated.");
}

// STOP

function stopJarvis(){

  isListening = false;

  if(recognition){

    recognition.stop();
  }

  setStatus("Idle");
}

// LISTEN LOOP

function startListening(){

  if(!isListening) return;

  setStatus("Listening...");

  recognition.start();

  recognition.onresult = (event)=>{

    let text =
    event.results[0][0].transcript;

    setStatus("Processing...");

    processCommand(text);
  };

  recognition.onerror = ()=>{

    setStatus("Retrying...");

    setTimeout(startListening,1000);
  };

  recognition.onend = ()=>{

    if(isListening){

      setTimeout(startListening,500);
    }
  };
}

// LOAD MEMORY

updateMemoryUI();

</script>

</body>
</html>
