<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020814;
  overflow:hidden;
  font-family:Arial;
  color:#00e5ff;
}

/* GRID */

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;

  background:
  linear-gradient(#00e5ff10 1px, transparent 1px),
  linear-gradient(90deg,#00e5ff10 1px, transparent 1px);

  background-size:40px 40px;
}

/* MAIN */

.main{
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;
}

/* TOP LEFT DATE TIME */

.datetime{

  position:absolute;

  top:20px;
  left:20px;

  color:#00e5ff;

  text-shadow:
  0 0 10px #00e5ff;
}

#day{
  font-size:24px;
}

#date{
  margin-top:5px;
  color:#9ee8ff;
}

#clock{
  margin-top:10px;
  font-size:34px;
}

/* STATUS TEXT */

.status{

  position:absolute;

  top:25px;
  right:25px;

  font-size:20px;

  text-shadow:
  0 0 12px #00e5ff;
}

/* REACTOR */

.reactor{

  width:340px;
  height:340px;

  position:relative;
}

/* OUTER RING */

.outer-ring{

  position:absolute;

  width:100%;
  height:100%;

  border-radius:50%;

  border:3px solid #00e5ff;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 70px #00e5ff;

  animation:rotate 12s linear infinite;
}

/* MIDDLE RING */

.middle-ring{

  position:absolute;

  inset:35px;

  border-radius:50%;

  border:2px solid #00e5ff;

  animation:rotateReverse 8s linear infinite;
}

/* INNER RING */

.inner-ring{

  position:absolute;

  inset:80px;

  border-radius:50%;

  border:2px solid #00e5ff;

  animation:rotate 6s linear infinite;
}

/* CORE */

.core{

  position:absolute;

  inset:125px;

  border-radius:50%;

  background:#00e5ff;

  box-shadow:
  0 0 30px #00e5ff,
  0 0 80px #00e5ff,
  0 0 150px #00e5ff;

  animation:pulse 2s infinite;
}

/* ANIMATIONS */

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

@keyframes rotateReverse{
  from{transform:rotate(360deg);}
  to{transform:rotate(0deg);}
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* MIC BUTTON */

.mic{

  position:absolute;

  bottom:120px;

  width:85px;
  height:85px;

  border-radius:50%;

  border:none;

  background:#00e5ff22;

  color:#00e5ff;

  font-size:38px;

  border:2px solid #00e5ff88;

  box-shadow:
  0 0 25px #00e5ff,
  0 0 60px #00e5ff55;
}

.mic:active{
  transform:scale(0.92);
}

/* WAVEFORM */

.wave-container{

  position:absolute;

  bottom:35px;

  width:100%;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  gap:6px;
}

.bar{

  width:6px;

  background:#00e5ff;

  border-radius:10px;

  animation:wave 1s infinite ease-in-out;

  box-shadow:
  0 0 10px #00e5ff;
}

.bar:nth-child(1){height:20px;animation-delay:0s;}
.bar:nth-child(2){height:45px;animation-delay:0.1s;}
.bar:nth-child(3){height:70px;animation-delay:0.2s;}
.bar:nth-child(4){height:35px;animation-delay:0.3s;}
.bar:nth-child(5){height:80px;animation-delay:0.4s;}
.bar:nth-child(6){height:45px;animation-delay:0.5s;}
.bar:nth-child(7){height:65px;animation-delay:0.6s;}
.bar:nth-child(8){height:30px;animation-delay:0.7s;}
.bar:nth-child(9){height:55px;animation-delay:0.8s;}
.bar:nth-child(10){height:25px;animation-delay:0.9s;}

@keyframes wave{
  0%{transform:scaleY(0.5);}
  50%{transform:scaleY(1.5);}
  100%{transform:scaleY(0.5);}
}

</style>

</head>

<body>

<div class="main">

<!-- DATE TIME -->

<div class="datetime">

<div id="day"></div>

<div id="date"></div>

<div id="clock"></div>

</div>

<!-- STATUS -->

<div class="status" id="status">
ONLINE
</div>

<!-- REACTOR -->

<div class="reactor">

<div class="outer-ring"></div>

<div class="middle-ring"></div>

<div class="inner-ring"></div>

<div class="core"></div>

</div>

<!-- MIC -->

<button class="mic"
onclick="startJarvis()">
🎤
</button>

<!-- WAVEFORM -->

<div class="wave-container">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

</div>

<script>

let recognition;

let isListening = false;

/* DATE TIME */

function updateDateTime(){

  const now = new Date();

  const days = [
    "Sunday",
    "Monday",
    "Tuesday",
    "Wednesday",
    "Thursday",
    "Friday",
    "Saturday"
  ];

  document.getElementById("day").innerText =
    days[now.getDay()];

  document.getElementById("date").innerText =
    now.toLocaleDateString(
      "en-US",
      {
        day:"numeric",
        month:"long",
        year:"numeric"
      }
    );

  document.getElementById("clock").innerText =
    now.toLocaleTimeString(
      "en-US",
      {
        hour:"numeric",
        minute:"2-digit",
        second:"2-digit",
        hour12:true
      }
    );
}

setInterval(updateDateTime,1000);

updateDateTime();

/* STATUS */

function setStatus(text){

  document.getElementById("status").innerText =
    text;
}

/* SPEAK */

function speak(text){

  let speech =
    new SpeechSynthesisUtterance(text);

  speech.rate = 0.95;

  speech.onstart = ()=>{

    setStatus("RESPONDING...");
  };

  speech.onend = ()=>{

    if(isListening){

      setTimeout(startListening,500);
    }
  };

  speechSynthesis.cancel();

  speechSynthesis.speak(speech);
}

/* MEMORY */

function rememberFact(fact){

  let memory = JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );

  memory.push(fact);

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify(memory)
  );
}

function getMemory(){

  return JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );
}

/* MATCH */

function match(text,arr){

  return arr.some(
    k=>text.includes(k)
  );
}

/* COMMAND ENGINE */

function processCommand(raw){

  let text = raw.toLowerCase();

  /* MEMORY SAVE */

  if(text.startsWith("remember")){

    let fact = text
      .replace("remember that","")
      .replace("remember","")
      .trim();

    if(fact){

      rememberFact(fact);

      speak("Memory saved.");

      return;
    }
  }

  /* MEMORY RECALL */

  if(
    match(text,[
      "what do you remember",
      "memory"
    ])
  ){

    let memory = getMemory();

    if(memory.length === 0){

      speak("Memory empty.");

      return;
    }

    speak(
      "I remember " +
      memory.join(". ")
    );

    return;
  }

  /* TIME */

  if(text.includes("time")){

    let time =
      new Date().toLocaleTimeString(
        "en-US",
        {
          hour:"numeric",
          minute:"2-digit",
          hour12:true
        }
      );

    speak(
      "The time is " + time
    );

    return;
  }

  /* YOUTUBE */

  if(text.includes("youtube")){

    speak("Opening YouTube");

    window.open(
      "https://youtube.com"
    );

    return;
  }

  /* IDENTITY */

  if(
    match(text,[
      "who are you",
      "your name"
    ])
  ){

    speak(
      "I am Jarvis, your AI assistant."
    );

    return;
  }

  /* DEFAULT */

  speak(
    "Command not recognized."
  );
}

/* START */

function startJarvis(){

  if(isListening) return;

  let SR =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SR){

    alert("Use Chrome browser");

    return;
  }

  recognition = new SR();

  recognition.lang = "en-US";

  recognition.continuous = false;

  recognition.interimResults = false;

  isListening = true;

  speak("Jarvis activated.");
}

/* LISTEN LOOP */

function startListening(){

  if(!isListening) return;

  setStatus("LISTENING...");

  recognition.start();

  recognition.onresult = (event)=>{

    let text =
      event.results[0][0].transcript;

    setStatus("PROCESSING...");

    processCommand(text);
  };

  recognition.onerror = ()=>{

    setStatus("RETRYING...");

    setTimeout(startListening,1000);
  };

  recognition.onend = ()=>{

    if(isListening){

      setTimeout(startListening,500);
    }
  };
}

</script>

</body>
</html>
