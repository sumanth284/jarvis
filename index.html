<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#030712;
  overflow:hidden;
  font-family:Arial,sans-serif;
  color:#00e5ff;
}

/* DATE TIME */

.datetime{

  position:absolute;

  top:20px;
  left:20px;

  z-index:100;

  text-shadow:
  0 0 10px #00e5ff;
}

#day{
  font-size:22px;
}

#date{
  margin-top:5px;
  color:#9fe8ff;
}

#clock{
  margin-top:8px;
  font-size:30px;
}

/* ONLINE */

.online{

  position:absolute;

  top:25px;
  right:25px;

  color:#00ff9d;

  font-size:20px;

  z-index:100;

  text-shadow:
  0 0 10px #00ff9d;
}

/* CENTER */

.center{

  position:absolute;

  width:100%;
  height:100%;

  display:flex;

  justify-content:center;

  align-items:center;
}

/* REACTOR */

.reactor{

  position:relative;

  width:320px;
  height:320px;

  display:flex;

  justify-content:center;

  align-items:center;
}

/* CORE */

.core{

  position:absolute;

  width:80px;
  height:80px;

  border-radius:50%;

  background:#00e5ff;

  box-shadow:
  0 0 30px #00e5ff,
  0 0 80px #00e5ff,
  0 0 140px #00e5ff;

  animation:pulse 2s infinite;
}

/* ORBITS */

.orbit{

  position:absolute;

  border:2px solid #00e5ff55;

  border-radius:50%;
}

/* ORBIT 1 */

.orbit1{

  width:140px;
  height:140px;

  animation:spin1 6s linear infinite;
}

/* ORBIT 2 */

.orbit2{

  width:220px;
  height:220px;

  transform:rotateX(75deg);

  animation:spin2 9s linear infinite;
}

/* ORBIT 3 */

.orbit3{

  width:300px;
  height:300px;

  transform:rotateY(75deg);

  animation:spin3 12s linear infinite;
}

/* ELECTRONS */

.electron{

  position:absolute;

  width:14px;
  height:14px;

  border-radius:50%;

  background:#00e5ff;

  top:-7px;
  left:50%;

  transform:translateX(-50%);

  box-shadow:
  0 0 15px #00e5ff,
  0 0 30px #00e5ff;
}

/* STATUS */

.status{

  position:absolute;

  bottom:170px;

  font-size:22px;

  text-shadow:
  0 0 15px #00e5ff;
}

/* WAVEFORM */

.wave-container{

  position:absolute;

  bottom:70px;

  width:100%;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  gap:5px;
}

.bar{

  width:6px;

  background:#00e5ff;

  border-radius:10px;

  animation:wave 1s infinite ease-in-out;

  box-shadow:
  0 0 10px #00e5ff;
}

.bar:nth-child(1){height:20px;animation-delay:0s;}
.bar:nth-child(2){height:40px;animation-delay:0.1s;}
.bar:nth-child(3){height:65px;animation-delay:0.2s;}
.bar:nth-child(4){height:35px;animation-delay:0.3s;}
.bar:nth-child(5){height:80px;animation-delay:0.4s;}
.bar:nth-child(6){height:40px;animation-delay:0.5s;}
.bar:nth-child(7){height:70px;animation-delay:0.6s;}
.bar:nth-child(8){height:30px;animation-delay:0.7s;}
.bar:nth-child(9){height:60px;animation-delay:0.8s;}
.bar:nth-child(10){height:25px;animation-delay:0.9s;}

/* MIC */

.mic-button{

  position:absolute;

  bottom:140px;
  left:50%;

  transform:translateX(-50%);

  width:80px;
  height:80px;

  border-radius:50%;

  border:none;

  background:#00e5ff22;

  color:#00e5ff;

  font-size:36px;

  border:2px solid #00e5ff88;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 50px #00e5ff55;
}

/* ANIMATIONS */

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes spin1{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes spin2{

  from{
    transform:rotateX(75deg) rotate(0deg);
  }

  to{
    transform:rotateX(75deg) rotate(360deg);
  }
}

@keyframes spin3{

  from{
    transform:rotateY(75deg) rotate(0deg);
  }

  to{
    transform:rotateY(75deg) rotate(360deg);
  }
}

@keyframes wave{

  0%{
    transform:scaleY(0.5);
  }

  50%{
    transform:scaleY(1.4);
  }

  100%{
    transform:scaleY(0.5);
  }
}

</style>

</head>

<body>

<!-- DATE TIME -->

<div class="datetime">

<div id="day"></div>

<div id="date"></div>

<div id="clock"></div>

</div>

<!-- ONLINE -->

<div class="online">
ONLINE
</div>

<!-- CENTER -->

<div class="center">

<div class="reactor">

<div class="orbit orbit1">
<div class="electron"></div>
</div>

<div class="orbit orbit2">
<div class="electron"></div>
</div>

<div class="orbit orbit3">
<div class="electron"></div>
</div>

<div class="core"></div>

</div>

<div class="status" id="status">
Idle
</div>

</div>

<!-- WAVEFORM -->

<div class="wave-container">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<!-- MIC -->

<button class="mic-button"
onclick="startJarvis()">
🎤
</button>

<script>

let recognition;

let isListening = false;

/* DATE TIME */

function updateDateTime(){

  const now = new Date();

  const days = [
    "Sunday","Monday","Tuesday",
    "Wednesday","Thursday",
    "Friday","Saturday"
  ];

  document.getElementById("day").innerText =
    days[now.getDay()];

  document.getElementById("date").innerText =
    now.toLocaleDateString(
      "en-US",
      {
        day:"numeric",
        month:"long",
        year:"numeric"
      }
    );

  document.getElementById("clock").innerText =
    now.toLocaleTimeString(
      "en-US",
      {
        hour:"numeric",
        minute:"2-digit",
        second:"2-digit",
        hour12:true
      }
    );
}

setInterval(updateDateTime,1000);

updateDateTime();

/* STATUS */

function setStatus(text){

  document.getElementById("status").innerText =
    text;
}

/* SPEAK */

function speak(text){

  speechSynthesis.cancel();

  let speech =
    new SpeechSynthesisUtterance(text);

  speech.rate = 0.95;

  speech.onstart = ()=>{

    setStatus("Responding...");
  };

  speech.onend = ()=>{

    if(isListening){

      setTimeout(()=>{
        startListening();
      },1000);
    }
  };

  speechSynthesis.speak(speech);
}

/* MEMORY */

function formatMemory(text){

  text = text.trim();

  if(text.startsWith("i ")){

    text = text.replace(/^i /,"you ");
  }

  if(text.startsWith("my ")){

    text = text.replace(/^my /,"your ");
  }

  return text;
}

function rememberFact(fact){

  let memory =
    JSON.parse(
      localStorage.getItem("jarvis_memory") || "[]"
    );

  fact = formatMemory(fact);

  memory.push(fact);

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify(memory)
  );
}

function getMemory(){

  return JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );
}

function clearMemory(){

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify([])
  );
}

/* MATCH */

function match(text,arr){

  return arr.some(
    k=>text.includes(k)
  );
}

/* COMMANDS */

function processCommand(raw){

  let text = raw.toLowerCase();

  /* CLEAR MEMORY */

  if(
    match(text,[
      "clear memory",
      "reset memory",
      "delete memory"
    ])
  ){

    clearMemory();

    speak("Memory cleared.");

    return;
  }

  /* REMEMBER */

  if(text.startsWith("remember")){

    let fact =
      text
      .replace("remember that","")
      .replace("remember","")
      .trim();

    if(fact){

      rememberFact(fact);

      speak("Memory saved.");

      return;
    }
  }

  /* RECALL */

  if(
    match(text,[
      "what do you remember",
      "memory"
    ])
  ){

    let memory = getMemory();

    if(memory.length === 0){

      speak("Memory empty.");

      return;
    }

    speak(memory.join(". "));

    return;
  }

  /* TIME */

  if(text.includes("time")){

    let currentTime =
      new Date().toLocaleTimeString(
        "en-US",
        {
          hour:"numeric",
          minute:"2-digit",
          hour12:true
        }
      );

    speak(
      "The time is " + currentTime
    );

    return;
  }

  /* NAME */

  if(
    match(text,[
      "who are you",
      "your name"
    ])
  ){

    speak("I am Jarvis.");

    return;
  }

  /* DEFAULT */

  speak("Command not recognized.");
}

/* START */

function startJarvis(){

  if(isListening) return;

  let SR =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SR){

    alert("Use Chrome browser");

    return;
  }

  recognition = new SR();

  recognition.lang = "en-US";

  recognition.continuous = false;

  recognition.interimResults = false;

  isListening = true;

  recognition.onresult = (event)=>{

    let text =
      event.results[0][0].transcript;

    setStatus("Processing...");

    processCommand(text);
  };

  recognition.onerror = ()=>{

    setStatus("Retrying...");

    setTimeout(()=>{
      startListening();
    },1500);
  };

  recognition.onend = ()=>{

    if(isListening){

      setTimeout(()=>{
        startListening();
      },1000);
    }
  };

  speak("Jarvis activated.");
}

/* LISTEN */

function startListening(){

  if(!isListening) return;

  setStatus("Listening...");

  try{

    recognition.start();

  }catch(err){}
}

</script>

</body>
</html>
