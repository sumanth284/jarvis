<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS X</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020412;
  overflow:hidden;
  font-family:Arial,sans-serif;
  color:#00e5ff;
}

/* BACKGROUND */

body::before{

  content:"";

  position:absolute;

  width:100%;
  height:100%;

  background:
  radial-gradient(circle at center,
  #00e5ff11 0%,
  transparent 70%);
}

/* DATE TIME */

.datetime{

  position:absolute;

  top:20px;
  left:20px;

  z-index:100;

  text-shadow:
  0 0 10px #00e5ff;
}

#day{
  font-size:22px;
}

#date{
  margin-top:5px;
  color:#9fe8ff;
}

#clock{
  margin-top:8px;
  font-size:30px;
}

/* ONLINE */

.online{

  position:absolute;

  top:20px;
  right:20px;

  color:#00ff9d;

  font-size:20px;

  text-shadow:
  0 0 10px #00ff9d;
}

/* CENTER */

.center{

  width:100vw;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* REACTOR */

.reactor{

  position:relative;

  width:380px;
  height:380px;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* OUTER RING */

.energy-ring{

  position:absolute;

  width:320px;
  height:320px;

  border-radius:50%;

  border:2px solid #00e5ff44;

  box-shadow:
  0 0 20px #00e5ff,
  inset 0 0 20px #00e5ff;

  animation:rotate 12s linear infinite;
}

/* SECOND RING */

.energy-ring2{

  position:absolute;

  width:250px;
  height:250px;

  border-radius:50%;

  border:2px dashed #00e5ff66;

  animation:rotateReverse 8s linear infinite;
}

/* THIRD RING */

.energy-ring3{

  position:absolute;

  width:180px;
  height:180px;

  border-radius:50%;

  border:2px solid #00e5ff88;

  animation:rotate 5s linear infinite;
}

/* CORE */

.core{

  position:absolute;

  width:90px;
  height:90px;

  border-radius:50%;

  background:#00e5ff;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 50px #00e5ff,
  0 0 120px #00e5ff;

  animation:pulse 2s infinite;
}

/* SCANNER */

.scanner{

  position:absolute;

  width:320px;
  height:320px;

  border-radius:50%;

  background:
  linear-gradient(
  90deg,
  transparent,
  #00e5ff55,
  transparent
  );

  animation:scannerRotate 4s linear infinite;
}

/* PARTICLES */

.particle{

  position:absolute;

  width:10px;
  height:10px;

  border-radius:50%;

  background:#00e5ff;

  box-shadow:
  0 0 15px #00e5ff;
}

.p1{
  top:40px;
  left:180px;
  animation:float1 4s infinite;
}

.p2{
  bottom:60px;
  right:80px;
  animation:float2 5s infinite;
}

.p3{
  left:50px;
  bottom:120px;
  animation:float3 6s infinite;
}

/* STATUS */

.status{

  position:absolute;

  bottom:170px;

  font-size:22px;

  text-shadow:
  0 0 15px #00e5ff;
}

/* WAVEFORM */

.wave-container{

  position:absolute;

  bottom:70px;

  width:100%;

  display:flex;
  justify-content:center;
  align-items:flex-end;

  gap:5px;
}

.bar{

  width:6px;

  background:#00e5ff;

  border-radius:10px;

  animation:wave 1s infinite ease-in-out;

  box-shadow:
  0 0 10px #00e5ff;
}

.bar:nth-child(1){height:20px;animation-delay:0s;}
.bar:nth-child(2){height:40px;animation-delay:0.1s;}
.bar:nth-child(3){height:65px;animation-delay:0.2s;}
.bar:nth-child(4){height:35px;animation-delay:0.3s;}
.bar:nth-child(5){height:80px;animation-delay:0.4s;}
.bar:nth-child(6){height:40px;animation-delay:0.5s;}
.bar:nth-child(7){height:70px;animation-delay:0.6s;}
.bar:nth-child(8){height:30px;animation-delay:0.7s;}
.bar:nth-child(9){height:60px;animation-delay:0.8s;}
.bar:nth-child(10){height:25px;animation-delay:0.9s;}

/* MIC BUTTON */

.mic-button{

  position:absolute;

  bottom:140px;
  left:50%;

  transform:translateX(-50%);

  width:80px;
  height:80px;

  border:none;
  border-radius:50%;

  background:#00e5ff22;

  color:#00e5ff;

  font-size:36px;

  border:2px solid #00e5ff88;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 50px #00e5ff55;

  cursor:pointer;
}

/* ANIMATIONS */

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.1);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes rotate{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes rotateReverse{

  from{
    transform:rotate(360deg);
  }

  to{
    transform:rotate(0deg);
  }
}

@keyframes scannerRotate{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes wave{

  0%{
    transform:scaleY(0.5);
  }

  50%{
    transform:scaleY(1.4);
  }

  100%{
    transform:scaleY(0.5);
  }
}

@keyframes float1{

  0%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0);}
}

@keyframes float2{

  0%{transform:translateX(0);}
  50%{transform:translateX(20px);}
  100%{transform:translateX(0);}
}

@keyframes float3{

  0%{transform:translateY(0);}
  50%{transform:translateY(15px);}
  100%{transform:translateY(0);}
}

</style>

</head>

<body>

<!-- DATE TIME -->

<div class="datetime">

<div id="day"></div>
<div id="date"></div>
<div id="clock"></div>

</div>

<!-- ONLINE -->

<div class="online">
ONLINE
</div>

<!-- CENTER -->

<div class="center">

<div class="reactor">

<div class="scanner"></div>

<div class="energy-ring"></div>

<div class="energy-ring2"></div>

<div class="energy-ring3"></div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>

<div class="core"></div>

</div>

<div class="status" id="status">
Idle
</div>

</div>

<!-- WAVEFORM -->

<div class="wave-container">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<!-- MIC -->

<button class="mic-button"
onclick="startJarvis()">
🎤
</button>

<script>

let recognition;
let isListening = false;

/* DATE TIME */

function updateDateTime(){

  const now = new Date();

  const days = [
    "Sunday","Monday","Tuesday",
    "Wednesday","Thursday",
    "Friday","Saturday"
  ];

  document.getElementById("day").innerText =
    days[now.getDay()];

  document.getElementById("date").innerText =
    now.toLocaleDateString(
      "en-US",
      {
        day:"numeric",
        month:"long",
        year:"numeric"
      }
    );

  document.getElementById("clock").innerText =
    now.toLocaleTimeString(
      "en-US",
      {
        hour:"numeric",
        minute:"2-digit",
        second:"2-digit",
        hour12:true
      }
    );
}

setInterval(updateDateTime,1000);

updateDateTime();

/* STATUS */

function setStatus(text){

  document.getElementById("status").innerText =
    text;
}

/* SPEAK */

function speak(text){

  speechSynthesis.cancel();

  let speech =
    new SpeechSynthesisUtterance(text);

  speech.rate = 0.95;

  speech.onstart = ()=>{

    setStatus("Responding...");
  };

  speech.onend = ()=>{

    if(isListening){

      setTimeout(()=>{
        startListening();
      },1000);
    }
  };

  speechSynthesis.speak(speech);
}

/* MEMORY */

function rememberFact(fact){

  let memory =
    JSON.parse(
      localStorage.getItem("jarvis_memory") || "[]"
    );

  memory.push(fact);

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify(memory)
  );
}

function getMemory(){

  return JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );
}

function clearMemory(){

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify([])
  );
}

/* MATCH */

function match(text,arr){

  return arr.some(
    k=>text.includes(k)
  );
}

/* COMMANDS */

function processCommand(raw){

  let text = raw.toLowerCase();

  if(
    match(text,[
      "clear memory",
      "reset memory",
      "delete memory"
    ])
  ){

    clearMemory();

    speak("Memory cleared.");

    return;
  }

  if(text.startsWith("remember")){

    let fact =
      text
      .replace("remember that","")
      .replace("remember","")
      .trim();

    if(fact){

      rememberFact(fact);

      speak("Memory saved.");

      return;
    }
  }

  if(
    match(text,[
      "what do you remember",
      "memory"
    ])
  ){

    let memory = getMemory();

    if(memory.length === 0){

      speak("Memory empty.");

      return;
    }

    speak(memory.join(". "));

    return;
  }

  if(text.includes("time")){

    let currentTime =
      new Date().toLocaleTimeString(
        "en-US",
        {
          hour:"numeric",
          minute:"2-digit",
          hour12:true
        }
      );

    speak(
      "The time is " + currentTime
    );

    return;
  }

  if(
    match(text,[
      "who are you",
      "your name"
    ])
  ){

    speak("I am Jarvis.");

    return;
  }

  speak("Command not recognized.");
}

/* START */

function startJarvis(){

  if(isListening) return;

  let SR =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SR){

    alert("Use Chrome browser");

    return;
  }

  recognition = new SR();

  recognition.lang = "en-US";

  recognition.continuous = false;

  recognition.interimResults = false;

  isListening = true;

  recognition.onresult = (event)=>{

    let text =
      event.results[0][0].transcript;

    setStatus("Processing...");

    processCommand(text);
  };

  recognition.onerror = ()=>{

    setStatus("Retrying...");

    setTimeout(()=>{
      startListening();
    },1500);
  };

  recognition.onend = ()=>{

    if(isListening){

      setTimeout(()=>{
        startListening();
      },1000);
    }
  };

  speak("Jarvis activated.");
}

/* LISTEN */

function startListening(){

  if(!isListening) return;

  setStatus("Listening...");

  try{

    recognition.start();

  }catch(err){}
}

</script>

</body>

</html>
