<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jarvis AI</title>

<style>

body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
  color:#00f7ff;
  text-align:center;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:#00f7ff33;
  border-radius:50%;
  filter:blur(100px);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 4s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* MAIN */
.container{
  position:relative;
  z-index:2;
  padding-top:60px;
}

/* TITLE */
h1{
  font-size:42px;
  letter-spacing:8px;
  text-shadow:0 0 20px #00f7ff;
}

/* AI CORE */
.core{
  width:180px;
  height:180px;
  border:3px solid #00f7ff;
  border-radius:50%;
  margin:40px auto;
  box-shadow:
    0 0 20px #00f7ff,
    0 0 60px #00f7ff;
  animation:rotate 10s linear infinite;
  position:relative;
}

.core::before{
  content:"";
  position:absolute;
  inset:20px;
  border-radius:50%;
  border:2px solid #00f7ff;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* STATUS PANEL */
.panel{
  width:85%;
  max-width:400px;
  margin:auto;
  padding:15px;
  border:1px solid #00f7ff55;
  background:#00101566;
  backdrop-filter:blur(10px);
  border-radius:15px;
  box-shadow:0 0 20px #00f7ff22;
}

/* STATUS */
#status{
  font-size:20px;
  margin-top:10px;
}

/* DEBUG */
#debug{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}

/* BUTTONS */
.buttons{
  margin-top:30px;
}

button{
  background:black;
  color:#00f7ff;
  border:2px solid #00f7ff;
  padding:15px 25px;
  margin:10px;
  border-radius:12px;
  font-size:16px;
  box-shadow:0 0 15px #00f7ff55;
}

button:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<div class="container">

<h1>JARVIS</h1>

<div class="core"></div>

<div class="panel">
  <div id="status">Idle</div>
  <div id="debug"></div>
</div>

<div class="buttons">
  <button onclick="startJarvis()">Start</button>
  <button onclick="stopJarvis()">Stop</button>
</div>

</div>

<script>

let recognition;
let isListening = false;

// STATUS
function setStatus(text){
  document.getElementById("status").innerText = text;
}

// DEBUG
function showDebug(text){
  document.getElementById("debug").innerText = "Heard: " + text;
}

// SPEAK
function speak(text){

  let speech = new SpeechSynthesisUtterance(text);

  speech.rate = 0.95;

  speech.onstart = ()=>{
    setStatus("Responding...");
  };

  speech.onend = ()=>{
    if(isListening){
      setTimeout(startListening, 400);
    }
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// MEMORY
function rememberFact(fact){

  let memory = JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );

  memory.push(fact);

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify(memory)
  );
}

function recallFacts(){

  return JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );
}

// VALID INPUT
function isValidInput(text){
  return text && text.length > 2;
}

// MATCH
function match(text, arr){
  return arr.some(k => text.includes(k));
}

// COMMAND ENGINE
function processCommand(rawText){

  let text = rawText.toLowerCase();

  showDebug(text);

  // MEMORY STORE
  if(
    text.startsWith("remember that") ||
    text.startsWith("remember")
  ){

    let fact = text
      .replace("remember that","")
      .replace("remember","")
      .trim();

    if(fact.length > 0){

      rememberFact(fact);

      speak("I will remember that.");

      return;
    }
  }

  // MEMORY RECALL
  if(
    match(text,[
      "what do you remember",
      "memory"
    ])
  ){

    let facts = recallFacts();

    if(facts.length === 0){
      speak("I do not remember anything yet.");
      return;
    }

    speak("I remember " + facts.join(". "));
    return;
  }

  // TIME
  if(text.includes("time")){
    let time = new Date().toLocaleTimeString();
    speak("The time is " + time);
    return;
  }

  // YOUTUBE
  if(text.includes("youtube")){
    speak("Opening YouTube");
    window.open("https://youtube.com");
    return;
  }

  // IDENTITY
  if(match(text,[
    "who are you",
    "your name"
  ])){
    speak("I am Jarvis, your personal assistant.");
    return;
  }

  // STOP
  if(match(text,[
    "stop",
    "shutdown",
    "exit"
  ])){
    speak("Shutting down.");
    stopJarvis();
    return;
  }

  speak("Please repeat clearly.");
}

// START
function startJarvis(){

  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Use Chrome browser");
    return;
  }

  recognition = new SR();

  recognition.lang = "en-US";

  isListening = true;

  speak("Jarvis activated.");
}

// STOP
function stopJarvis(){

  isListening = false;

  if(recognition){
    recognition.stop();
  }

  setStatus("Idle");
}

// LOOP
function startListening(){

  if(!isListening) return;

  setStatus("Listening...");

  recognition.start();

  recognition.onresult = (event)=>{

    let text = event.results[0][0].transcript;

    if(!isValidInput(text)){
      setTimeout(startListening,500);
      return;
    }

    setStatus("Processing...");

    processCommand(text);
  };

  recognition.onend = ()=>{

    if(isListening){
      setTimeout(startListening,500);
    }
  };

  recognition.onerror = ()=>{
    setTimeout(startListening,1000);
  };
}

</script>

</body>
</html>
