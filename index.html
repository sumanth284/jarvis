<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS AI</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020412;
  overflow:hidden;
  font-family:Arial, sans-serif;
  color:#00e5ff;
  height:100vh;
}

/* BACKGROUND GRID */
.grid{
  position:absolute;
  width:100%;
  height:100%;
  background:
    linear-gradient(#00e5ff11 1px, transparent 1px),
    linear-gradient(90deg,#00e5ff11 1px, transparent 1px);
  background-size:40px 40px;
  z-index:0;
}

/* GLOW */
.glow{
  position:absolute;
  width:500px;
  height:500px;
  background:#00e5ff22;
  border-radius:50%;
  filter:blur(120px);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 4s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* MAIN */
.main{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:30px;
}

/* TITLE */
h1{
  letter-spacing:10px;
  font-size:42px;
  text-shadow:
    0 0 10px #00e5ff,
    0 0 30px #00e5ff;
}

/* CORE */
.core{
  width:220px;
  height:220px;
  margin-top:35px;
  border-radius:50%;
  border:4px solid #00e5ff;
  position:relative;
  box-shadow:
    0 0 20px #00e5ff,
    0 0 60px #00e5ff;
  animation:rotate 8s linear infinite;
}

.core::before{
  content:"";
  position:absolute;
  inset:25px;
  border-radius:50%;
  border:3px solid #00e5ff;
}

.core::after{
  content:"";
  position:absolute;
  inset:60px;
  border-radius:50%;
  background:#00e5ff;
  box-shadow:
    0 0 20px #00e5ff,
    0 0 50px #00e5ff;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* PANEL */
.panel{
  width:90%;
  max-width:420px;
  margin-top:35px;
  background:#08121fdd;
  border:1px solid #00e5ff44;
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px #00e5ff22;
}

/* STATUS */
#status{
  font-size:22px;
  margin-bottom:10px;
}

/* DEBUG */
#debug{
  font-size:14px;
  color:#8fa9b3;
  margin-bottom:20px;
}

/* MEMORY PANEL */
.memory-title{
  margin-bottom:10px;
  font-size:18px;
}

#memoryList{
  text-align:left;
  max-height:150px;
  overflow:auto;
  color:#d8faff;
}

.memory-item{
  margin-bottom:8px;
  padding:8px;
  border-left:2px solid #00e5ff;
  background:#00e5ff11;
}

/* BUTTONS */
.controls{
  margin-top:25px;
}

button{
  padding:15px 28px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#00e5ff22;
  color:#00e5ff;
  font-size:16px;
  border:1px solid #00e5ff88;
  box-shadow:0 0 15px #00e5ff44;
}

button:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<div class="grid"></div>
<div class="glow"></div>

<div class="main">

<h1>JARVIS</h1>

<div class="core"></div>

<div class="panel">

<div id="status">Idle</div>

<div id="debug">Waiting...</div>

<div class="memory-title">Memory</div>

<div id="memoryList"></div>

</div>

<div class="controls">
<button onclick="startJarvis()">Start</button>
<button onclick="stopJarvis()">Stop</button>
</div>

</div>

<script>

let recognition;
let isListening = false;

// STATUS
function setStatus(text){
  document.getElementById("status").innerText = text;
}

// DEBUG
function showDebug(text){
  document.getElementById("debug").innerText =
    "Heard: " + text;
}

// SPEAK
function speak(text){

  let speech =
    new SpeechSynthesisUtterance(text);

  speech.rate = 0.95;

  speech.onstart = ()=>{
    setStatus("Responding...");
  };

  speech.onend = ()=>{
    if(isListening){
      setTimeout(startListening,500);
    }
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// MEMORY SAVE
function rememberFact(fact){

  let memory = JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );

  memory.push(fact);

  localStorage.setItem(
    "jarvis_memory",
    JSON.stringify(memory)
  );

  updateMemoryUI();
}

// MEMORY LOAD
function getMemory(){

  return JSON.parse(
    localStorage.getItem("jarvis_memory") || "[]"
  );
}

// UPDATE MEMORY UI
function updateMemoryUI(){

  let memory = getMemory();

  let box =
    document.getElementById("memoryList");

  box.innerHTML = "";

  memory.forEach(item=>{

    let div = document.createElement("div");

    div.className = "memory-item";

    div.innerText = item;

    box.appendChild(div);
  });
}

// VALID INPUT
function isValidInput(text){

  return text && text.trim().length > 2;
}

// MATCH
function match(text, arr){

  return arr.some(k=>text.includes(k));
}

// PROCESS COMMAND
function processCommand(rawText){

  let text = rawText.toLowerCase();

  showDebug(text);

  // REMEMBER
  if(
    text.startsWith("remember that") ||
    text.startsWith("remember")
  ){

    let fact = text
      .replace("remember that","")
      .replace("remember","")
      .trim();

    if(fact){

      rememberFact(fact);

      speak("Memory saved.");

      return;
    }
  }

  // MEMORY RECALL
  if(
    match(text,[
      "what do you remember",
      "show memory",
      "memory"
    ])
  ){

    let memory = getMemory();

    if(memory.length === 0){

      speak("Memory is empty.");

      return;
    }

    speak(
      "I remember " +
      memory.join(". ")
    );

    return;
  }

  // TIME
  if(text.includes("time")){

    let time =
      new Date().toLocaleTimeString();

    speak("The time is " + time);

    return;
  }

  // YOUTUBE
  if(text.includes("youtube")){

    speak("Opening YouTube");

    window.open("https://youtube.com");

    return;
  }

  // WHO ARE YOU
  if(
    match(text,[
      "who are you",
      "your name"
    ])
  ){

    speak(
      "I am Jarvis, your AI assistant."
    );

    return;
  }

  // STOP
  if(
    match(text,[
      "stop",
      "shutdown",
      "exit"
    ])
  ){

    speak("Shutting down.");

    stopJarvis();

    return;
  }

  // DEFAULT
  speak("Please repeat clearly.");
}

// START
function startJarvis(){

  let SR =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SR){

    alert("Use Chrome browser");

    return;
  }

  recognition = new SR();

  recognition.lang = "en-US";

  recognition.continuous = false;

  recognition.interimResults = false;

  isListening = true;

  speak("Jarvis activated.");
}

// STOP
function stopJarvis(){

  isListening = false;

  if(recognition){
    recognition.stop();
  }

  setStatus("Idle");
}

// LISTEN LOOP
function startListening(){

  if(!isListening) return;

  setStatus("Listening...");

  recognition.start();

  recognition.onresult = (event)=>{

    let text =
      event.results[0][0].transcript;

    if(!isValidInput(text)){

      setTimeout(startListening,500);

      return;
    }

    setStatus("Processing...");

    processCommand(text);
  };

  recognition.onerror = ()=>{

    setStatus("Retrying...");

    setTimeout(startListening,1000);
  };

  recognition.onend = ()=>{

    if(isListening){

      setTimeout(startListening,500);
    }
  };
}

// LOAD MEMORY UI ON START
updateMemoryUI();

</script>

</body>
</html>
