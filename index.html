 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Phase 2</title>

<style>
body{
  background:black;
  color:#00f7ff;
  font-family:Arial;
  text-align:center;
}
h1{
  margin-top:40px;
  text-shadow:0 0 20px #00f7ff;
}
button{
  margin-top:25px;
  padding:18px;
  font-size:18px;
  background:black;
  border:2px solid #00f7ff;
  color:#00f7ff;
}
#status{
  margin-top:25px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>JARVIS</h1>

<button onclick="startJarvis()">Start</button>
<button onclick="stopJarvis()">Stop</button>

<p id="status">Idle</p>

<script>

let recognition;
let isListening = false;

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.95;

  speech.onstart = ()=> setStatus("Responding...");
  speech.onend = ()=>{
    if(isListening) setTimeout(startListening, 400);
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// ===== MEMORY SYSTEM =====
function remember(key, value){
  localStorage.setItem(key, value);
}

function recall(key){
  return localStorage.getItem(key);
}

// ===== INPUT FILTER =====
function isValidInput(text){
  if(!text || text.length < 3) return false;
  return true;
}

// ===== COMMAND ENGINE =====
function processCommand(text){

  text = text.toLowerCase();
  text = text.replace(/[^\w\s]/gi, "");

  // ===== MEMORY STORE =====
  if(text.includes("my name is")){
    let name = text.replace("my name is", "").trim();
    remember("user_name", name);
    speak("I will remember that.");
    return;
  }

  // ===== MEMORY RECALL =====
  if(text.includes("what is my name")){
    let name = recall("user_name");
    if(name){
      speak("Your name is " + name);
    } else {
      speak("I do not know your name yet.");
    }
    return;
  }

  // ===== TIME =====
  if(text.includes("time")){
    let time = new Date().toLocaleTimeString();
    speak("The time is " + time);
    return;
  }

  // ===== YOUTUBE =====
  if(text.includes("youtube")){
    speak("Opening YouTube");
    window.open("https://youtube.com");
    return;
  }

  // ===== STOP =====
  if(text.includes("stop")){
    speak("Shutting down.");
    stopJarvis();
    return;
  }

  speak("Understood.");
}

// ===== START =====
function startJarvis(){
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Use Chrome browser");
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";

  isListening = true;

  speak("Jarvis activated.");
}

// ===== STOP =====
function stopJarvis(){
  isListening = false;
  if(recognition) recognition.stop();
  setStatus("Idle");
}

// ===== LOOP =====
function startListening(){

  if(!isListening) return;

  setStatus("Listening...");
  recognition.start();

  recognition.onresult = (event)=>{
    let text = event.results[0][0].transcript;

    if(!isValidInput(text)){
      setTimeout(startListening, 500);
      return;
    }

    setStatus("Processing...");
    processCommand(text);
  };

  recognition.onend = ()=>{
    if(isListening){
      setTimeout(startListening, 500);
    }
  };

  recognition.onerror = ()=>{
    setTimeout(startListening, 1000);
  };
}

</script>

</body>
</html>
