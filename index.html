<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#030712;
  overflow:hidden;
  font-family:Arial;
  color:#00e5ff;
}

/* DATE TIME */

.datetime{

  position:absolute;

  top:20px;
  left:20px;

  z-index:5;

  text-shadow:
  0 0 10px #00e5ff;
}

#day{
  font-size:24px;
}

#date{
  margin-top:5px;
  color:#9fe8ff;
}

#clock{
  margin-top:8px;
  font-size:34px;
}

/* ONLINE */

.online{

  position:absolute;

  top:25px;
  right:25px;

  font-size:22px;

  color:#00ff9d;

  text-shadow:
  0 0 10px #00ff9d;
}

/* CENTER */

.center{

  position:absolute;

  width:100%;
  height:100%;

  display:flex;

  justify-content:center;

  align-items:center;
}

/* ATOM REACTOR */

.reactor{

  position:relative;

  width:420px;
  height:420px;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* NUCLEUS */

.core{

  width:90px;
  height:90px;

  border-radius:50%;

  background:#00e5ff;

  position:absolute;

  box-shadow:
  0 0 30px #00e5ff,
  0 0 80px #00e5ff,
  0 0 150px #00e5ff;

  animation:pulse 2s infinite;
}

/* SHELLS */

.shell{

  position:absolute;

  border:2px solid #00e5ff88;

  border-radius:50%;
}

/* SHELL 1 */

.shell1{

  width:180px;
  height:180px;

  animation:rotate 6s linear infinite;
}

/* SHELL 2 */

.shell2{

  width:260px;
  height:260px;

  transform:rotateX(70deg);

  animation:rotateReverse 10s linear infinite;
}

/* SHELL 3 */

.shell3{

  width:340px;
  height:340px;

  transform:rotateY(70deg);

  animation:rotate 14s linear infinite;
}

/* ELECTRONS */

.electron{

  width:14px;
  height:14px;

  border-radius:50%;

  background:#00e5ff;

  position:absolute;

  top:-7px;
  left:50%;

  transform:translateX(-50%);

  box-shadow:
  0 0 15px #00e5ff,
  0 0 30px #00e5ff;
}

/* ANIMATIONS */

@keyframes rotate{
  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes rotateReverse{
  from{
    transform:rotate(360deg);
  }

  to{
    transform:rotate(0deg);
  }
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }
}

/* STATUS */

.status{

  position:absolute;

  bottom:170px;

  font-size:24px;

  text-shadow:
  0 0 15px #00e5ff;
}

/* WAVEFORM */

.wave-container{

  position:absolute;

  bottom:70px;

  width:100%;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  gap:5px;
}

.bar{

  width:6px;

  background:#00e5ff;

  border-radius:10px;

  animation:wave 1s infinite ease-in-out;

  box-shadow:
  0 0 10px #00e5ff;
}

.bar:nth-child(1){height:20px;animation-delay:0s;}
.bar:nth-child(2){height:40px;animation-delay:0.1s;}
.bar:nth-child(3){height:65px;animation-delay:0.2s;}
.bar:nth-child(4){height:35px;animation-delay:0.3s;}
.bar:nth-child(5){height:80px;animation-delay:0.4s;}
.bar:nth-child(6){height:40px;animation-delay:0.5s;}
.bar:nth-child(7){height:70px;animation-delay:0.6s;}
.bar:nth-child(8){height:30px;animation-delay:0.7s;}
.bar:nth-child(9){height:60px;animation-delay:0.8s;}
.bar:nth-child(10){height:25px;animation-delay:0.9s;}

@keyframes wave{

  0%{
    transform:scaleY(0.5);
  }

  50%{
    transform:scaleY(1.4);
  }

  100%{
    transform:scaleY(0.5);
  }
}

/* MIC BUTTON */

.mic-button{

  position:absolute;

  bottom:140px;

  left:50%;

  transform:translateX(-50%);

  width:80px;
  height:80px;

  border-radius:50%;

  border:none;

  background:#00e5ff22;

  color:#00e5ff;

  font-size:36px;

  border:2px solid #00e5ff88;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 50px #00e5ff55;
}

.mic-button:active{

  transform:
  translateX(-50%)
  scale(0.92);
}

</style>

</head>

<body>

<div class="datetime">

<div id="day"></div>

<div id="date"></div>

<div id="clock"></div>

</div>

<div class="online">
ONLINE
</div>

<div class="center">

<div class="reactor">

<div class="shell shell1">
<div class="electron"></div>
</div>

<div class="shell shell2">
<div class="electron"></div>
</div>

<div class="shell shell3">
<div class="electron"></div>
</div>

<div class="core"></div>

</div>

<div class="status" id="status">
Idle
</div>

</div>

<div class="wave-container">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<button class="mic-button"
onclick="startJarvis()">
🎤
</button>

<script>

/* KEEP YOUR EXISTING JAVASCRIPT HERE */

</script>

</body>
</html>
