<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020412;
  overflow:hidden;
  font-family:Arial,sans-serif;
  color:#00e5ff;
}

/* DATE TIME */

.datetime{
  position:absolute;
  top:20px;
  left:20px;
  z-index:100;
}

#day{
  font-size:22px;
}

#date{
  margin-top:5px;
  color:#9fe8ff;
}

#clock{
  margin-top:8px;
  font-size:30px;
}

/* ONLINE */

.online{
  position:absolute;
  top:20px;
  right:20px;
  color:#00ff9d;
  font-size:20px;
}

/* CENTER */

.center{
  width:100vw;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* REACTOR */

.reactor{
  position:relative;
  width:350px;
  height:350px;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* CORE */

.core{
  position:absolute;

  width:90px;
  height:90px;

  border-radius:50%;

  background:#00e5ff;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 60px #00e5ff,
  0 0 120px #00e5ff;

  animation:pulse 2s infinite;
}

/* ORBIT WRAPPERS */

.orbit-wrap{
  position:absolute;

  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* ORBIT PATH */

.orbit{
  position:relative;

  border:2px solid #00e5ff55;
  border-radius:50%;
}

/* ELECTRON */

.electron{
  position:absolute;

  width:16px;
  height:16px;

  border-radius:50%;

  background:#00e5ff;

  top:-8px;
  left:50%;

  transform:translateX(-50%);

  box-shadow:
  0 0 15px #00e5ff,
  0 0 30px #00e5ff;
}

/* ORBIT SIZES */

.orbit1{
  width:140px;
  height:140px;
}

.orbit2{
  width:220px;
  height:220px;
}

.orbit3{
  width:300px;
  height:300px;
}

/* REAL ROTATION */

.wrap1{
  animation:rotate1 5s linear infinite;
}

.wrap2{
  animation:rotate2 8s linear infinite;
}

.wrap3{
  animation:rotate3 11s linear infinite;
}

/* TILTS */

.wrap2 .orbit{
  transform:rotateX(75deg);
}

.wrap3 .orbit{
  transform:rotateY(75deg);
}

/* STATUS */

.status{
  position:absolute;
  bottom:170px;
  font-size:22px;
}

/* WAVEFORM */

.wave-container{
  position:absolute;
  bottom:70px;

  width:100%;

  display:flex;
  justify-content:center;
  align-items:flex-end;

  gap:5px;
}

.bar{
  width:6px;

  background:#00e5ff;

  border-radius:10px;

  animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(1){height:20px;animation-delay:0s;}
.bar:nth-child(2){height:40px;animation-delay:0.1s;}
.bar:nth-child(3){height:65px;animation-delay:0.2s;}
.bar:nth-child(4){height:35px;animation-delay:0.3s;}
.bar:nth-child(5){height:80px;animation-delay:0.4s;}
.bar:nth-child(6){height:40px;animation-delay:0.5s;}
.bar:nth-child(7){height:70px;animation-delay:0.6s;}
.bar:nth-child(8){height:30px;animation-delay:0.7s;}
.bar:nth-child(9){height:60px;animation-delay:0.8s;}
.bar:nth-child(10){height:25px;animation-delay:0.9s;}

/* MIC */

.mic-button{
  position:absolute;

  bottom:140px;
  left:50%;

  transform:translateX(-50%);

  width:80px;
  height:80px;

  border:none;
  border-radius:50%;

  background:#00e5ff22;

  color:#00e5ff;

  font-size:36px;

  border:2px solid #00e5ff88;

  box-shadow:
  0 0 20px #00e5ff,
  0 0 50px #00e5ff55;
}

/* ANIMATIONS */

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes rotate1{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes rotate2{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(-360deg);
  }
}

@keyframes rotate3{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes wave{

  0%{
    transform:scaleY(0.5);
  }

  50%{
    transform:scaleY(1.4);
  }

  100%{
    transform:scaleY(0.5);
  }
}

</style>

</head>

<body>

<!-- DATE TIME -->

<div class="datetime">

<div id="day"></div>

<div id="date"></div>

<div id="clock"></div>

</div>

<!-- ONLINE -->

<div class="online">
ONLINE
</div>

<!-- CENTER -->

<div class="center">

<div class="reactor">

<div class="orbit-wrap wrap1">
<div class="orbit orbit1">
<div class="electron"></div>
</div>
</div>

<div class="orbit-wrap wrap2">
<div class="orbit orbit2">
<div class="electron"></div>
</div>
</div>

<div class="orbit-wrap wrap3">
<div class="orbit orbit3">
<div class="electron"></div>
</div>
</div>

<div class="core"></div>

</div>

<div class="status" id="status">
Idle
</div>

</div>

<!-- WAVEFORM -->

<div class="wave-container">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<!-- MIC -->

<button class="mic-button">
🎤
</button>

<script>

/* DATE TIME */

function updateDateTime(){

  const now = new Date();

  const days = [
    "Sunday","Monday","Tuesday",
    "Wednesday","Thursday",
    "Friday","Saturday"
  ];

  document.getElementById("day").innerText =
    days[now.getDay()];

  document.getElementById("date").innerText =
    now.toLocaleDateString(
      "en-US",
      {
        day:"numeric",
        month:"long",
        year:"numeric"
      }
    );

  document.getElementById("clock").innerText =
    now.toLocaleTimeString(
      "en-US",
      {
        hour:"numeric",
        minute:"2-digit",
        second:"2-digit",
        hour12:true
      }
    );
}

setInterval(updateDateTime,1000);

updateDateTime();

</script>

</body>

</html>
