<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Phase 2</title>

<style>
body{
  background:black;
  color:#00f7ff;
  font-family:Arial;
  text-align:center;
}
h1{
  margin-top:40px;
}
button{
  margin-top:25px;
  padding:18px;
  font-size:18px;
  background:black;
  border:2px solid #00f7ff;
  color:#00f7ff;
}
#status{
  margin-top:25px;
  font-size:18px;
}
#debug{
  margin-top:15px;
  font-size:14px;
  color:#888;
}
</style>
</head>

<body>

<h1>JARVIS</h1>

<button onclick="startJarvis()">Start</button>
<button onclick="stopJarvis()">Stop</button>

<p id="status">Idle</p>
<p id="debug"></p>

<script>

let recognition;
let isListening = false;

// STATUS
function setStatus(text){
  document.getElementById("status").innerText = text;
}

// DEBUG DISPLAY
function showDebug(text){
  document.getElementById("debug").innerText = "Heard: " + text;
}

// SPEAK
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.95;

  speech.onstart = ()=> setStatus("Responding...");
  speech.onend = ()=>{
    if(isListening) setTimeout(startListening, 400);
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// MEMORY
function remember(key, value){
  localStorage.setItem(key, value);
}
function recall(key){
  return localStorage.getItem(key);
}

// INPUT FILTER
function isValidInput(text){
  if(!text || text.length < 3) return false;
  return true;
}

// MATCH HELPER
function match(text, keywords){
  return keywords.some(k => text.includes(k));
}

// COMMAND ENGINE
function processCommand(text){

  text = text.toLowerCase();
  text = text.replace(/[^\w\s]/gi, "");

  // ===== DEBUG =====
  showDebug(text);

  // MEMORY STORE
  if(text.includes("my name is")){
    let name = text.replace("my name is", "").trim();
    remember("user_name", name);
    speak("I will remember that.");
    return;
  }

  // MEMORY RECALL
  if(match(text, ["what is my name","do you know my name"])){
    let name = recall("user_name");
    if(name){
      speak("Your name is " + name);
    } else {
      speak("I do not know your name yet.");
    }
    return;
  }

  // CREATOR (FIXED)
  if(match(text, [
    "who created you",
    "who made you",
    "who built you",
    "your creator"
  ])){
    speak("I was created by my developer to become a powerful assistant.");
    return;
  }

  // IDENTITY
  if(match(text, ["who are you","your name"])){
    speak("I am Jarvis, your personal assistant.");
    return;
  }

  // TIME
  if(match(text, ["time","current time","what time"])){
    let time = new Date().toLocaleTimeString();
    speak("The time is " + time);
    return;
  }

  // YOUTUBE
  if(match(text, ["youtube","open youtube","play youtube"])){
    speak("Opening YouTube");
    window.open("https://youtube.com");
    return;
  }

  // STOP
  if(match(text, ["stop","shutdown","exit"])){
    speak("Shutting down.");
    stopJarvis();
    return;
  }

  // EMOTION
  if(match(text, ["tired","sad"])){
    speak("You sound tired. Take a break.");
    return;
  }

  if(match(text, ["happy","good"])){
    speak("Good. Stay focused.");
    return;
  }

  // DEFAULT
  speak("I did not understand. Please repeat.");
}

// START
function startJarvis(){
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Use Chrome browser");
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";

  isListening = true;

  speak("Jarvis activated.");
}

// STOP
function stopJarvis(){
  isListening = false;
  if(recognition) recognition.stop();
  setStatus("Idle");
}

// LOOP
function startListening(){

  if(!isListening) return;

  setStatus("Listening...");
  recognition.start();

  recognition.onresult = (event)=>{
    let text = event.results[0][0].transcript;

    if(!isValidInput(text)){
      setTimeout(startListening, 500);
      return;
    }

    setStatus("Processing...");
    processCommand(text);
  };

  recognition.onend = ()=>{
    if(isListening){
      setTimeout(startListening, 500);
    }
  };

  recognition.onerror = ()=>{
    setTimeout(startListening, 1000);
  };
}

</script>

</body>
</html>
